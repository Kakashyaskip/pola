name = "pola-api"
main = "src/index.ts"
compatibility_date = "2025-06-17"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "pola-db"
database_id = "PLACEHOLDER_D1_DATABASE_ID"

[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "pola-photos"

[[kv_namespaces]]
binding = "SESSIONS"
id = "PLACEHOLDER_KV_NAMESPACE_ID"

[vars]
ENVIRONMENT = "development"
JWT_ISSUER = "https://pola.app"
APPLE_TEAM_ID = "PLACEHOLDER_APPLE_TEAM_ID"
APPLE_CLIENT_ID = "app.pola.ios"

[dev]
port = 8787
